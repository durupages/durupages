name: Build durupages-workerd

# Builds the custom workerd embedder (native/durupages-workerd) and, optionally,
# the `worker-native` container image that bundles it. This is DELIBERATELY
# separate from the tag-driven Release workflow: workerd is heavy to build
# (V8 from source) and versions on its own cadence, so it is triggered manually.
#
# The image is tagged  v${WORKERD_UPSTREAM_VERSION}-duru${revision}
# where WORKERD_UPSTREAM_VERSION comes from native/durupages-workerd/WORKERD_VERSION
# and ${revision} is the manual input. Example: v1.20260721.1-duru1.

on:
  workflow_dispatch:
    inputs:
      revision:
        description: 'DuruPages revision number (the N in -duruN)'
        required: true
        type: string
      push_image:
        description: 'Build and push the worker-native image to GHCR'
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

concurrency:
  group: workerd-build
  cancel-in-progress: false

jobs:
  # Shared version/ref computation so both platform builds and the merge job
  # agree on the exact same tag without recomputing it independently.
  version:
    name: compute version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      workerd_ref: ${{ steps.version.outputs.workerd_ref }}
    steps:
      - uses: actions/checkout@v7

      - name: Compute version
        id: version
        env:
          REVISION: ${{ inputs.revision }}
        run: |
          set -euo pipefail
          # Revision must be a bare number so the tag stays well-formed.
          if ! echo "$REVISION" | grep -Eq '^[0-9]+$'; then
            echo "::error::revision '$REVISION' must be a non-negative integer"
            exit 1
          fi
          # shellcheck disable=SC1091
          source native/durupages-workerd/WORKERD_VERSION
          if [ -z "${WORKERD_UPSTREAM_VERSION:-}" ]; then
            echo "::error::WORKERD_UPSTREAM_VERSION missing from WORKERD_VERSION"
            exit 1
          fi
          VERSION="v${WORKERD_UPSTREAM_VERSION}-duru${REVISION}"
          echo "Building $VERSION (workerd ref ${WORKERD_REF})"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "workerd_ref=$WORKERD_REF" >> "$GITHUB_OUTPUT"

  build:
    name: build durupages-workerd (${{ matrix.arch }})
    needs: version
    runs-on: ${{ matrix.runner }}
    # V8 is compiled from source on the first run for a given (workerd ref,
    # arch) pair; the bazel disk cache (restored below) makes later runs fast.
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: blacksmith-4vcpu-ubuntu-2404
            bazelisk_asset: bazelisk-linux-amd64
          - arch: arm64
            runner: blacksmith-4vcpu-ubuntu-2404-arm
            bazelisk_asset: bazelisk-linux-arm64
    steps:
      - uses: actions/checkout@v7

      - name: Free disk space
        # A full workerd + V8 build needs far more than the ~14 GB free on a
        # stock runner; reclaim the large preinstalled toolchains we do not use.
        # Removing the Android SDK also leaves ANDROID_HOME dangling — build.sh
        # blanks it for Bazel (rules_android would otherwise fail analysis), and
        # we clear it for the whole job here so nothing else trips over it.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
                      "$AGENT_TOOLSDIRECTORY" || true
          echo "ANDROID_HOME=" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=" >> "$GITHUB_ENV"
          df -h /

      - name: Install build toolchain
        run: |
          set -euo pipefail
          sudo apt-get update
          # LLVM 20 explicitly (all from the Ubuntu 24.04 archive):
          #  - workerd compiles with -stdlib=libc++, so the libc++ *dev* headers
          #    are required or every TU fails with "'cstddef' file not found".
          #  - We install the VERSIONED packages only and deliberately not the
          #    unversioned `clang`/`lld`. build.sh prefers an unversioned clang
          #    if one exists, and Ubuntu's plain `clang` is 18 without matching
          #    libc++ — leaving it out makes build.sh pick clang-20, which is the
          #    combination this build is verified against.
          #  - tcl provides tclsh, needed by sqlite's build codegen.
          sudo apt-get install -y --no-install-recommends \
            clang-20 lld-20 libc++-20-dev libc++abi-20-dev \
            tcl git ca-certificates
          # bazelisk honours the repo's .bazelversion and fetches the right bazel.
          sudo curl -fsSL -o /usr/local/bin/bazelisk \
            "https://github.com/bazelbuild/bazelisk/releases/download/v1.29.0/${{ matrix.bazelisk_asset }}"
          sudo chmod +x /usr/local/bin/bazelisk
          clang-20 --version | head -1
          bazelisk version || true

      - name: Restore bazel disk cache
        uses: actions/cache@v6
        with:
          # build.sh points its --disk_cache here; keyed by (arch, workerd ref)
          # so a repin gets a fresh cache while same-ref rebuilds stay warm. The
          # disk cache holds compiled objects and is not portable across arches.
          path: ~/.cache/durupages-workerd
          key: workerd-diskcache-${{ matrix.arch }}-${{ needs.version.outputs.workerd_ref }}
          restore-keys: |
            workerd-diskcache-${{ matrix.arch }}-

      - name: Build durupages-workerd
        env:
          DURUPAGES_BAZEL: bazelisk
          # Pin the compiler: runner images ship an unversioned `clang` (18)
          # that build.sh would otherwise prefer, and it has no matching libc++.
          DURUPAGES_CC: clang-20
          DURUPAGES_CXX: clang++-20
          # Matches the Blacksmith 4vcpu runner class used for both arches.
          DURUPAGES_BUILD_JOBS: '4'
          DURUPAGES_BUILD_MEM_MB: '12000'
        run: |
          ./native/durupages-workerd/build.sh
          ./native/durupages-workerd/bin/durupages-workerd --version

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: durupages-workerd-${{ needs.version.outputs.version }}-${{ matrix.arch }}
          path: native/durupages-workerd/bin/durupages-workerd
          if-no-files-found: error
          retention-days: 14

      - name: Log in to GHCR
        if: ${{ inputs.push_image }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        if: ${{ inputs.push_image }}
        uses: docker/setup-buildx-action@v3

      - name: Build & push worker-native image (${{ matrix.arch }}, by digest)
        if: ${{ inputs.push_image }}
        id: build_image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: worker-native
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/durupages-worker,push-by-digest=true,name-canonical=true,push=true
          labels: |
            org.opencontainers.image.title=durupages-worker
            org.opencontainers.image.description=DuruPages worker (shim + durupages-workerd)
            org.opencontainers.image.version=${{ needs.version.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Export digest
        if: ${{ inputs.push_image }}
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build_image.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        if: ${{ inputs.push_image }}
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: merge worker-native image
    if: ${{ inputs.push_image }}
    needs: [version, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      REGISTRY_IMAGE: ghcr.io/${{ github.repository_owner }}/durupages-worker
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            -t "${REGISTRY_IMAGE}:${{ needs.version.outputs.version }}" \
            $(printf "${REGISTRY_IMAGE}@sha256:%s " *)

      - name: Inspect image
        run: docker buildx imagetools inspect "${REGISTRY_IMAGE}:${{ needs.version.outputs.version }}"

  summary:
    name: summary
    needs: [version, build, merge]
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Summary
        run: |
          {
            echo "## durupages-workerd ${{ needs.version.outputs.version }}"
            echo ""
            echo "- workerd ref: \`${{ needs.version.outputs.workerd_ref }}\`"
            echo "- binary artifacts: durupages-workerd-${{ needs.version.outputs.version }}-amd64, -arm64"
            if [ "${{ inputs.push_image }}" = "true" ]; then
              echo "- image: \`ghcr.io/${{ github.repository_owner }}/durupages-worker:${{ needs.version.outputs.version }}\` (linux/amd64, linux/arm64)"
            else
              echo "- image: not pushed (push_image=false)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
