{{- if .Values.createWorkerNamespace }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.workerNamespace }}
  labels:
    {{- include "durupages.labels" . | nindent 4 }}
    kubernetes.io/metadata.name: {{ .Values.workerNamespace }}
---
{{- end }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.workerServiceAccount }}
  namespace: {{ .Values.workerNamespace }}
  labels:
    {{- include "durupages.componentLabels" (dict "root" . "component" "worker") | nindent 4 }}
automountServiceAccountToken: false
---
# Controller's permission to manage worker pods, scoped to the worker namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "durupages.fullname" . }}-worker-pods
  namespace: {{ .Values.workerNamespace }}
  labels:
    {{- include "durupages.componentLabels" (dict "root" . "component" "controller") | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "durupages.fullname" . }}-worker-pods
  namespace: {{ .Values.workerNamespace }}
  labels:
    {{- include "durupages.componentLabels" (dict "root" . "component" "controller") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "durupages.fullname" . }}-worker-pods
subjects:
  - kind: ServiceAccount
    name: {{ include "durupages.controllerServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
