{{/* Rendered unconditionally, so a broken TLS configuration fails at template
     time rather than as a CrashLoopBackOff. */}}
{{- include "durupages.tls.validate" . }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "durupages.controllerServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "durupages.componentLabels" (dict "root" . "component" "controller") | nindent 4 }}
{{- include "durupages.imagePullSecrets" . | nindent 0 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "durupages.controller.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "durupages.componentLabels" (dict "root" . "component" "controller") | nindent 4 }}
    {{- with .Values.controller.service.labels }}{{ toYaml . | nindent 4 }}{{- end }}
  {{- with .Values.controller.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- include "durupages.service.spec" (dict "service" .Values.controller.service) | nindent 2 }}
  ports:
    - name: grpc
      port: {{ .Values.controller.service.port }}
      targetPort: grpc
      protocol: TCP
      {{- with .Values.controller.service.nodePort }}
      nodePort: {{ . }}
      {{- end }}
    {{- if .Values.controller.adminApi.enabled }}
    # Admin API — UNAUTHENTICATED by design. Exposing it beyond the cluster is
    # your own risk; do not add an Ingress/LoadBalancer without your own auth.
    - name: admin
      port: {{ .Values.controller.adminApi.service.port }}
      targetPort: admin
      protocol: TCP
      {{- with .Values.controller.adminApi.service.nodePort }}
      nodePort: {{ . }}
      {{- end }}
    {{- end }}
  selector:
    {{- include "durupages.componentSelectorLabels" (dict "root" . "component" "controller") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "durupages.controller.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "durupages.componentLabels" (dict "root" . "component" "controller") | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "durupages.componentSelectorLabels" (dict "root" . "component" "controller") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "durupages.componentLabels" (dict "root" . "component" "controller") | nindent 8 }}
        {{- with .Values.controller.podLabels }}{{ toYaml . | nindent 8 }}{{- end }}
      annotations:
        checksum/worker-jwt: {{ include "durupages.workerJwtSecretName" . | sha256sum }}
        {{- if .Values.worker.podOverrides }}
        # Content, not name: the ConfigMap's name never changes, so hashing it
        # would never roll the controller and an edited override set would sit
        # unread until something else restarted the pod.
        checksum/worker-pod-overrides: {{ include "durupages.workerPodOverridesYAML" . | sha256sum }}
        {{- end }}
        {{- with .Values.controller.podAnnotations }}{{ toYaml . | nindent 8 }}{{- end }}
    spec:
      serviceAccountName: {{ include "durupages.controllerServiceAccountName" . }}
      {{- with .Values.controller.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: controller
          image: {{ include "durupages.image" (dict "root" . "image" .Values.controller.image) | quote }}
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          args:
            - --worker-jwt-signing-key=/etc/durupages/worker-jwt/{{ .Values.workerJwt.privateKeyKey }}
            - --default-queue-timeout={{ .Values.controller.defaultQueueTimeout }}
            - --max-queue-timeout={{ .Values.controller.maxQueueTimeout }}
            - --default-request-timeout={{ .Values.controller.defaultRequestTimeout }}
            - --default-max-concurrency={{ .Values.controller.defaultMaxConcurrency }}
            - --max-concurrency-per-pod={{ .Values.controller.maxConcurrencyPerPod }}
            - --target-concurrency-per-pod={{ .Values.controller.targetConcurrencyPerPod }}
            - --default-idle-ttl={{ .Values.controller.defaultIdleTTL }}
            {{- if .Values.worker.podOverrides }}
            - --worker-pod-overrides-file={{ include "durupages.workerPodOverridesFile" . }}
            {{- end }}
            {{- with .Values.controller.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: DURUPAGES_LISTEN
              value: ":{{ .Values.controller.service.port }}"
            - name: DURUPAGES_PAGES_DOMAIN
              value: {{ .Values.pagesDomain | quote }}
            - name: DURUPAGES_MIGRATE
              value: {{ .Values.controller.migrate | quote }}
            # The *_ADVERTISE_* addresses are what the controller hands to the
            # worker pods it creates; they are not addresses it dials itself.
            - name: DURUPAGES_CONTROLLER_ADVERTISE_ADDR
              value: {{ include "durupages.controllerAddr" . | quote }}
            - name: DURUPAGES_HUB_ADVERTISE_ADDR
              value: {{ include "durupages.hubBundleAddr" . | quote }}
            {{- if .Values.logIngest.enabled }}
            - name: DURUPAGES_HUB_LOG_ADVERTISE_ADDR
              value: {{ include "durupages.hubLogAddr" . | quote }}
            {{- end }}
            {{- if .Values.tls.enabled }}
            # Own gRPC listener certificate. tlsconf reloads it from disk, so a
            # cert-manager renewal takes effect without a restart.
            - name: DURUPAGES_TLS_CERT_FILE
              value: {{ printf "%s/tls.crt" (include "durupages.tls.certDir" .) | quote }}
            - name: DURUPAGES_TLS_KEY_FILE
              value: {{ printf "%s/tls.key" (include "durupages.tls.certDir" .) | quote }}
            {{- if and .Values.controller.adminApi.enabled (include "durupages.tls.adminSeparate" .) }}
            # Admin API on its own certificate/domain (it reuses the one above
            # when these are unset).
            - name: DURUPAGES_ADMIN_TLS_CERT_FILE
              value: {{ printf "%s/tls.crt" (include "durupages.tls.adminCertDir" .) | quote }}
            - name: DURUPAGES_ADMIN_TLS_KEY_FILE
              value: {{ printf "%s/tls.key" (include "durupages.tls.adminCertDir" .) | quote }}
            {{- end }}
            {{- if include "durupages.tls.caEnabled" . }}
            # Injected into every worker pod as inline DURUPAGES_CA_CERT_PEM:
            # worker pods live in another namespace and are created at runtime,
            # so the bundle travels in the pod spec instead of as a Secret.
            - name: DURUPAGES_WORKER_CA_CERT_FILE
              value: {{ include "durupages.tls.caFile" . | quote }}
            {{- end }}
            {{- end }}
            {{- with (include "durupages.tls.clientEnv" .) }}
            # Restated to every worker pod: whether each endpoint speaks TLS is
            # knowledge the controller has and the worker cannot infer.
            {{- . | nindent 12 }}
            {{- end }}
            - name: DURUPAGES_WORKER_NAMESPACE
              value: {{ .Values.workerNamespace | quote }}
            - name: DURUPAGES_WORKER_IMAGE
              value: {{ include "durupages.image" (dict "root" . "image" .Values.worker.image) | quote }}
            - name: DURUPAGES_WORKER_SA
              value: {{ .Values.workerServiceAccount | quote }}
            - name: DURUPAGES_WORKER_CPU_LIMIT
              value: {{ .Values.worker.cpuLimit | quote }}
            - name: DURUPAGES_WORKER_MEM_LIMIT
              value: {{ .Values.worker.memLimit | quote }}
            {{- with .Values.worker.bundleMinIdle }}
            - name: DURUPAGES_BUNDLE_MIN_IDLE
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.worker.bundleCacheMaxBytes }}
            - name: DURUPAGES_BUNDLE_CACHE_MAX_BYTES
              value: {{ . | quote }}
            {{- end }}
            - name: DURUPAGES_PG_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "durupages.postgresSecretName" . }}
                  key: {{ include "durupages.postgresSecretKey" . }}
            {{- if .Values.controller.adminApi.enabled }}
            # Admin API: unauthenticated management + deployment upload. It is
            # the only part of the controller that touches Storage.
            - name: DURUPAGES_ADMIN_ENABLED
              value: "true"
            - name: DURUPAGES_ADMIN_LISTEN
              value: ":{{ .Values.controller.adminApi.service.port }}"
            {{- with .Values.controller.adminApi.maxUploadBytes }}
            - name: DURUPAGES_ADMIN_MAX_UPLOAD_BYTES
              value: {{ . | quote }}
            {{- end }}
            {{- include "durupages.s3Env" . | nindent 12 }}
            {{- end }}
            {{- with .Values.controller.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: grpc
              containerPort: {{ .Values.controller.service.port }}
              protocol: TCP
            {{- if .Values.controller.adminApi.enabled }}
            - name: admin
              containerPort: {{ .Values.controller.adminApi.service.port }}
              protocol: TCP
            {{- end }}
          {{- with .Values.controller.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.controller.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: worker-jwt
              mountPath: /etc/durupages/worker-jwt
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- if .Values.worker.podOverrides }}
            - name: worker-pod-overrides
              mountPath: {{ include "durupages.workerPodOverridesDir" . }}
              readOnly: true
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: {{ include "durupages.tls.certDir" . }}
              readOnly: true
            {{- if and .Values.controller.adminApi.enabled (include "durupages.tls.adminSeparate" .) }}
            - name: tls-admin
              mountPath: {{ include "durupages.tls.adminCertDir" . }}
              readOnly: true
            {{- end }}
            {{- if include "durupages.tls.caEnabled" . }}
            - name: ca
              mountPath: {{ include "durupages.tls.caDir" . }}
              readOnly: true
            {{- end }}
            {{- end }}
      volumes:
        - name: worker-jwt
          secret:
            secretName: {{ include "durupages.workerJwtSecretName" . }}
            items:
              - key: {{ .Values.workerJwt.privateKeyKey }}
                path: {{ .Values.workerJwt.privateKeyKey }}
        {{- if .Values.worker.podOverrides }}
        - name: worker-pod-overrides
          configMap:
            name: {{ include "durupages.workerPodOverridesName" . }}
        {{- end }}
        {{- if .Values.tls.enabled }}
        {{- include "durupages.tls.certVolume" (dict
              "name" "tls"
              "secretName" (include "durupages.tls.controllerSecretName" .)
              "certKey" .Values.tls.controller.certKey
              "keyKey" .Values.tls.controller.keyKey) | nindent 8 }}
        {{- if and .Values.controller.adminApi.enabled (include "durupages.tls.adminSeparate" .) }}
        {{- include "durupages.tls.certVolume" (dict
              "name" "tls-admin"
              "secretName" (include "durupages.tls.adminSecretName" .)
              "certKey" .Values.tls.admin.certKey
              "keyKey" .Values.tls.admin.keyKey) | nindent 8 }}
        {{- end }}
        {{- if include "durupages.tls.caEnabled" . }}
        {{- include "durupages.tls.caVolume" . | nindent 8 }}
        {{- end }}
        {{- end }}
        # securityContext.readOnlyRootFilesystem makes / read-only, so /tmp must
        # be a writable volume. The admin API stages each uploaded deployment
        # here while extracting it (see controller.tmpSize).
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.controller.tmpSize }}
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
