{{- if not .Values.workerJwt.existingSecret }}
{{- if or (empty .Values.workerJwt.privateKeyPEM) (empty .Values.workerJwt.publicKeyPEM) }}
{{- fail "\n\ndurupages: worker JWT keys are required.\nHelm cannot derive an Ed25519 public key from a private key, so you must either\nset workerJwt.existingSecret OR provide BOTH workerJwt.privateKeyPEM and\nworkerJwt.publicKeyPEM. Generate a keypair with:\n\n  openssl genpkey -algorithm ed25519 -out worker-jwt.key\n  openssl pkey -in worker-jwt.key -pubout -out worker-jwt.pub\n\nthen install with:\n\n  --set-file workerJwt.privateKeyPEM=worker-jwt.key \\\n  --set-file workerJwt.publicKeyPEM=worker-jwt.pub\n" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "durupages.workerJwtSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "durupages.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.workerJwt.privateKeyKey }}: {{ .Values.workerJwt.privateKeyPEM | b64enc }}
  {{ .Values.workerJwt.publicKeyKey }}: {{ .Values.workerJwt.publicKeyPEM | b64enc }}
{{- end }}
