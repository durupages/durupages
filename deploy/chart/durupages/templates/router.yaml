apiVersion: v1
kind: Service
metadata:
  name: {{ include "durupages.router.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "durupages.componentLabels" (dict "root" . "component" "router") | nindent 4 }}
    {{- with .Values.router.service.labels }}{{ toYaml . | nindent 4 }}{{- end }}
  {{- with .Values.router.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- include "durupages.service.spec" (dict "service" .Values.router.service) | nindent 2 }}
  ports:
    - name: http
      port: {{ .Values.router.service.port }}
      targetPort: http
      protocol: TCP
      {{- with .Values.router.service.nodePort }}
      nodePort: {{ . }}
      {{- end }}
  selector:
    {{- include "durupages.componentSelectorLabels" (dict "root" . "component" "router") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "durupages.router.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "durupages.componentLabels" (dict "root" . "component" "router") | nindent 4 }}
spec:
  replicas: {{ .Values.router.replicas }}
  selector:
    matchLabels:
      {{- include "durupages.componentSelectorLabels" (dict "root" . "component" "router") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "durupages.componentLabels" (dict "root" . "component" "router") | nindent 8 }}
        {{- with .Values.router.podLabels }}{{ toYaml . | nindent 8 }}{{- end }}
      {{- with .Values.router.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.router.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: router
          image: {{ include "durupages.image" (dict "root" . "image" .Values.router.image) | quote }}
          imagePullPolicy: {{ .Values.router.image.pullPolicy }}
          args:
            - --resolve-cache-ttl={{ .Values.router.resolveCacheTTL }}
            {{- with .Values.router.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: DURUPAGES_LISTEN
              value: ":{{ .Values.router.service.port }}"
            - name: DURUPAGES_CONTROLLER_ADDR
              value: {{ include "durupages.controllerAddr" . | quote }}
            {{- if .Values.logIngest.enabled }}
            - name: DURUPAGES_HUB_LOG_ADDR
              value: {{ include "durupages.hubLogAddr" . | quote }}
            {{- end }}
            - name: DURUPAGES_PAGES_DOMAIN
              value: {{ .Values.pagesDomain | quote }}
            - name: DURUPAGES_STATIC_CACHE_DIR
              value: {{ .Values.router.staticCacheDir | quote }}
            - name: DURUPAGES_STATIC_CACHE_MAX_BYTES
              # int64 first: YAML parses a large number as a float, and the
              # binary's strconv.ParseInt rejects "1.073741824e+09", silently
              # falling back to its own default.
              value: {{ .Values.router.staticCacheMaxBytes | int64 | quote }}
            {{- if include "durupages.tls.caEnabled" . }}
            # The router is a client only: it needs the CA, never a key pair.
            - name: DURUPAGES_CA_CERT_FILE
              value: {{ include "durupages.tls.caFile" . | quote }}
            {{- end }}
            {{- with (include "durupages.tls.clientEnv" .) }}
            {{- . | nindent 12 }}
            {{- end }}
            {{- include "durupages.s3Env" . | nindent 12 }}
            {{- with .Values.router.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.router.service.port }}
              protocol: TCP
          {{- with .Values.router.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.router.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: static-cache
              mountPath: {{ .Values.router.staticCacheDir }}
            {{- if include "durupages.tls.caEnabled" . }}
            - name: ca
              mountPath: {{ include "durupages.tls.caDir" . }}
              readOnly: true
            {{- end }}
      volumes:
        - name: static-cache
          emptyDir:
            sizeLimit: {{ .Values.router.staticCacheSize }}
        {{- if include "durupages.tls.caEnabled" . }}
        {{- include "durupages.tls.caVolume" . | nindent 8 }}
        {{- end }}
      {{- with .Values.router.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.router.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.router.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
