apiVersion: v1
kind: Service
metadata:
  name: {{ include "durupages.hub.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "durupages.componentLabels" (dict "root" . "component" "hub") | nindent 4 }}
    {{- with .Values.hub.service.labels }}{{ toYaml . | nindent 4 }}{{- end }}
  {{- with .Values.hub.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- include "durupages.service.spec" (dict "service" .Values.hub.service) | nindent 2 }}
  ports:
    - name: http
      port: {{ .Values.hub.service.httpPort }}
      targetPort: http
      protocol: TCP
      {{- with .Values.hub.service.httpNodePort }}
      nodePort: {{ . }}
      {{- end }}
    - name: grpc
      port: {{ .Values.hub.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
      {{- with .Values.hub.service.grpcNodePort }}
      nodePort: {{ . }}
      {{- end }}
  selector:
    {{- include "durupages.componentSelectorLabels" (dict "root" . "component" "hub") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "durupages.hub.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "durupages.componentLabels" (dict "root" . "component" "hub") | nindent 4 }}
spec:
  replicas: {{ .Values.hub.replicas }}
  selector:
    matchLabels:
      {{- include "durupages.componentSelectorLabels" (dict "root" . "component" "hub") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "durupages.componentLabels" (dict "root" . "component" "hub") | nindent 8 }}
        {{- with .Values.hub.podLabels }}{{ toYaml . | nindent 8 }}{{- end }}
      annotations:
        checksum/worker-jwt: {{ include "durupages.workerJwtSecretName" . | sha256sum }}
        {{- with .Values.hub.podAnnotations }}{{ toYaml . | nindent 8 }}{{- end }}
    spec:
      {{- with .Values.hub.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: hub
          image: {{ include "durupages.image" (dict "root" . "image" .Values.hub.image) | quote }}
          imagePullPolicy: {{ .Values.hub.image.pullPolicy }}
          args:
            - --worker-jwt-pubkey=/etc/durupages/worker-jwt/{{ .Values.workerJwt.publicKeyKey }}
            {{- with .Values.hub.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: DURUPAGES_LISTEN_HTTP
              value: ":{{ .Values.hub.service.httpPort }}"
            - name: DURUPAGES_LISTEN_GRPC
              value: ":{{ .Values.hub.service.grpcPort }}"
            - name: DURUPAGES_BUNDLE_CACHE_DIR
              value: {{ .Values.hub.bundleCacheDir | quote }}
            - name: DURUPAGES_BUNDLE_CACHE_MAX_BYTES
              # int64 first: YAML parses a large number as a float, and the
              # binary's strconv.ParseInt rejects "4.294967296e+09", silently
              # falling back to its own default.
              value: {{ .Values.hub.bundleCacheMaxBytes | int64 | quote }}
            {{- if .Values.tls.enabled }}
            # Bundle HTTP listener certificate.
            - name: DURUPAGES_TLS_CERT_FILE
              value: {{ printf "%s/tls.crt" (include "durupages.tls.certDir" .) | quote }}
            - name: DURUPAGES_TLS_KEY_FILE
              value: {{ printf "%s/tls.key" (include "durupages.tls.certDir" .) | quote }}
            {{- if include "durupages.tls.hubLogSeparate" . }}
            # Log gRPC listener on its own certificate/domain. Left unset, the
            # hub reuses the bundle listener's certificate for both.
            - name: DURUPAGES_LOG_TLS_CERT_FILE
              value: {{ printf "%s/tls.crt" (include "durupages.tls.logCertDir" .) | quote }}
            - name: DURUPAGES_LOG_TLS_KEY_FILE
              value: {{ printf "%s/tls.key" (include "durupages.tls.logCertDir" .) | quote }}
            {{- end }}
            {{- end }}
            {{- include "durupages.s3Env" . | nindent 12 }}
            {{- with .Values.hub.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.hub.service.httpPort }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.hub.service.grpcPort }}
              protocol: TCP
          {{- with .Values.hub.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.hub.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: worker-jwt
              mountPath: /etc/durupages/worker-jwt
              readOnly: true
            - name: bundle-cache
              mountPath: {{ .Values.hub.bundleCacheDir }}
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: {{ include "durupages.tls.certDir" . }}
              readOnly: true
            {{- if include "durupages.tls.hubLogSeparate" . }}
            - name: tls-log
              mountPath: {{ include "durupages.tls.logCertDir" . }}
              readOnly: true
            {{- end }}
            {{- end }}
      volumes:
        - name: worker-jwt
          secret:
            secretName: {{ include "durupages.workerJwtSecretName" . }}
            items:
              - key: {{ .Values.workerJwt.publicKeyKey }}
                path: {{ .Values.workerJwt.publicKeyKey }}
        {{- if .Values.tls.enabled }}
        {{- include "durupages.tls.certVolume" (dict
              "name" "tls"
              "secretName" (include "durupages.tls.hubSecretName" .)
              "certKey" .Values.tls.hub.certKey
              "keyKey" .Values.tls.hub.keyKey) | nindent 8 }}
        {{- if include "durupages.tls.hubLogSeparate" . }}
        {{- include "durupages.tls.certVolume" (dict
              "name" "tls-log"
              "secretName" (include "durupages.tls.hubLogSecretName" .)
              "certKey" .Values.tls.hubLog.certKey
              "keyKey" .Values.tls.hubLog.keyKey) | nindent 8 }}
        {{- end }}
        {{- end }}
        - name: bundle-cache
          emptyDir:
            sizeLimit: {{ .Values.hub.bundleCacheSize }}
      {{- with .Values.hub.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.hub.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.hub.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
