{{- if not .Values.s3.existingSecret }}
{{- if and .Values.s3.accessKey .Values.s3.secretKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "durupages.s3SecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "durupages.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.s3.accessKeySecretKey }}: {{ .Values.s3.accessKey | quote }}
  {{ .Values.s3.secretKeySecretKey }}: {{ .Values.s3.secretKey | quote }}
{{- end }}
{{- end }}
{{- if empty .Values.s3.bucket }}
{{- fail "\n\ndurupages: s3.bucket is required (used by router and hub).\n" }}
{{- end }}
